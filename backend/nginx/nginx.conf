# SAFAT — Nginx Reverse Proxy
# Supports 2x api replicas and 2x socket replicas via Docker DNS + least_conn

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 2048;
  use epoll;
  multi_accept on;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Logging ────────────────────────────────────────────────────────────────
  log_format main
    '$remote_addr - [$time_local] "$request" $status $body_bytes_sent '
    'rt=$request_time uct=$upstream_connect_time '
    'rid=$http_x_request_id';  # log correlation ID from client

  access_log /var/log/nginx/access.log main;

  # ── Performance ────────────────────────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  server_tokens   off;
  gzip            on;
  gzip_types      text/plain application/json application/javascript text/css;
  gzip_min_length 1000;

  # ── Security headers (applied globally) ───────────────────────────────────
  add_header X-Frame-Options          "DENY"                              always;
  add_header X-Content-Type-Options   "nosniff"                           always;
  add_header X-XSS-Protection         "1; mode=block"                     always;
  add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Permissions-Policy       "geolocation=(), camera=(), microphone=()" always;

  # ── Rate limiting zones ────────────────────────────────────────────────────
  limit_req_zone  $binary_remote_addr zone=api:10m     rate=30r/s;
  limit_req_zone  $binary_remote_addr zone=auth:10m    rate=5r/m;
  limit_req_zone  $binary_remote_addr zone=upload:10m  rate=10r/m;
  limit_conn_zone $binary_remote_addr zone=conn:10m;

  # ── Upstream: API (least_conn distributes across Docker Compose replicas) ──
  # Docker's internal DNS resolves "api" to all replica IPs.
  # least_conn sends new requests to the replica with fewest active connections.
  resolver 127.0.0.11 valid=5s;  # Docker embedded DNS

  upstream api_backend {
    least_conn;
    server api:3001 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  # ── Upstream: Socket.IO (ip_hash ensures session affinity) ────────────────
  upstream socket_backend {
    ip_hash;        # sticky sessions — same client → same socket instance
    server socket:3002 max_fails=3 fail_timeout=30s;
    keepalive 16;
  }

  # ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
  server {
    listen 80;
    server_name api.safat.app;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS main server ──────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name api.safat.app;

    ssl_certificate        /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key    /etc/nginx/ssl/privkey.pem;
    ssl_protocols          TLSv1.2 TLSv1.3;
    ssl_ciphers            ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache      shared:SSL:10m;
    ssl_session_timeout    1d;
    ssl_stapling           on;
    ssl_stapling_verify    on;

    client_max_body_size 25M;
    limit_conn conn 20;

    # Generate a request ID if client didn't send one
    set $req_id $http_x_request_id;
    if ($req_id = '') { set $req_id $request_id; }
    add_header X-Request-ID $req_id always;

    # ── Health check — no rate limit, no logging ─────────────────────────
    location = /api/health {
      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      access_log         off;
      proxy_set_header   X-Request-ID $req_id;
    }

    # ── Auth endpoints — strict rate limit ───────────────────────────────
    location ~* ^/api/auth/(login|register|refresh) {
      limit_req        zone=auth burst=3 nodelay;
      limit_req_status 429;
      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Request-ID      $req_id;
    }

    # ── Upload endpoint ───────────────────────────────────────────────────
    location /api/upload {
      limit_req          zone=upload burst=5 nodelay;
      client_max_body_size 25M;
      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Request-ID      $req_id;
      proxy_read_timeout 120s;
    }

    # ── General API ───────────────────────────────────────────────────────
    location /api/ {
      limit_req          zone=api burst=50 nodelay;
      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Request-ID      $req_id;
      proxy_connect_timeout 10s;
      proxy_read_timeout    30s;
    }

    # ── Socket.IO WebSocket ───────────────────────────────────────────────
    location /socket.io/ {
      proxy_pass             http://socket_backend;
      proxy_http_version     1.1;
      proxy_set_header       Upgrade    $http_upgrade;
      proxy_set_header       Connection "upgrade";
      proxy_set_header       Host       $host;
      proxy_set_header       X-Real-IP  $remote_addr;
      proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header       X-Request-ID $req_id;
      proxy_read_timeout     86400s;
      proxy_send_timeout     86400s;
      proxy_buffering        off;
    }
  }
}
