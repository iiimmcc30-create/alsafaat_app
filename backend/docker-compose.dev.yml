# Local development — PostgreSQL + Redis only (ports exposed to localhost)
# Usage: docker compose -f docker-compose.dev.yml up -d

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: safat_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB:       safat_db
      POSTGRES_USER:     safat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U safat -d safat_db"]
      interval: 5s
      timeout:  5s
      retries:  10

  redis:
    image: redis:7-alpine
    container_name: safat_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  5s
      retries:  10

volumes:
  postgres_dev_data:
  redis_dev_data:
